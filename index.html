<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leon Driving - Admin</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --gray: #1a1a1a; }
        body { background: var(--dark); color: var(--gold); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--gray); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); text-align: center; width: 320px; }
        h2 { margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #888; font-size: 0.8rem; margin-bottom: 25px; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 12px; width: 85%; border-radius: 8px; margin-bottom: 15px; text-align: center; outline: none; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 93%; transition: 0.3s; }
        button:hover { background: #fff; }
        #res { margin-top: 25px; font-size: 1.8rem; color: #fff; text-shadow: 0 0 10px var(--gold); font-weight: bold; border-top: 1px dashed #444; padding-top: 15px; letter-spacing: 3px; }
        #err { color: #ff4444; font-size: 0.8rem; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div id="l" class="card">
        <h2>🔒 ADMIN</h2>
        <p>SISTEMA DE LICENCIAS</p>
        <input type="password" id="p" placeholder="PIN DE ACCESO" maxlength="4">
        <div id="err">PIN INCORRECTO</div>
        <button onclick="v()">ENTRAR</button>
    </div>

    <div id="g" class="card" style="display:none;">
        <h2>🦁 GENERADOR</h2>
        <p>ID DINÁMICO (EJ: JUAN-110)</p>
        <input type="text" id="id" placeholder="INGRESE ID COMPLETO">
        <button onclick="gen()">GENERAR CLAVE</button>
        <div id="res">----</div>
    </div>

    <script>
        // Ofuscado
        var _0x4f = ["\x32\x30\x32\x33", "\x4c\x45\x4f\x4e\x5f\x55\x4c\x54\x52\x41\x5f\x32\x30\x32\x34"];

        // Función para verificar PIN
        function v() {
            var inputPin = document.getElementById("p").value;
            if(inputPin === _0x4f[0]) {
                document.getElementById("l").style.display = "none";
                document.getElementById("g").style.display = "block";
            } else {
                document.getElementById("err").style.display = "block";
                document.getElementById("p").value = "";
            }
        }

        // Función para generar clave
        function gen() {
            var fullID = document.getElementById("id").value.toUpperCase().trim();
            if(!fullID) return;

            var str = fullID + _0x4f[1];
            var h = 0;
            for (var i = 0; i < str.length; i++) {
                h = ((h << 5) - h) + str.charCodeAt(i);
                h |= 0;
            }
            document.getElementById("res").innerText = Math.abs(h).toString(16).toUpperCase();
        }

        // Tecla Enter para el PIN
        document.getElementById("p").addEventListener("keyup", function(e) {
            if (e.key === "Enter") v();
        });
    </script>
</body>
</html>
